name: Anime Quote of the Day

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  update-quote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Generate anime quote SVG
        run: python3 scripts/generate_anime_quote.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/anime-quote.svg
          git diff --staged --quiet || (git commit -m "chore: update anime quote of the day" && git push)
