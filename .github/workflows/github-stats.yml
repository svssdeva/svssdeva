name: Generate GitHub Stats

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub stats SVGs
        run: python3 scripts/generate_github_stats.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/github-stats.svg assets/github-langs.svg assets/github-trophies.svg
          git diff --staged --quiet || (git commit -m "chore: update github stats" && git push)
