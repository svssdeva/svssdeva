name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Generate Snake Animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=FFD700&color_dots[0]=ebedf0&color_dots[1]=9be9a8&color_dots[2]=40c463&color_dots[3]=30a14e&color_dots[4]=216e39
            dist/github-contribution-grid-snake-dark.svg?color_snake=FFD700&color_dots[0]=161b22&color_dots[1]=ffe066&color_dots[2]=ffd700&color_dots[3]=ffb300&color_dots[4]=ff8c00

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
